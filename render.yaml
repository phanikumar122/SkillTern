services:
  - type: web
    name: internship-matching
    env: node
    rootDir: Smart Internship Checker/backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false # User must provide this in the Render dashboard
