<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SkillTern</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--s-md);
            position: relative;
        }

        .auth-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: blur(80px);
            z-index: -1;
            opacity: 0.2;
        }

        .auth-card {
            max-width: 500px;
            width: 100%;
            padding: var(--s-lg);
        }

        .role-selection {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: var(--s-md);
        }

        .role-card {
            padding: var(--s-md);
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            cursor: pointer;
            text-align: center;
            transition: var(--transition);
        }

        .role-card:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .role-card.selected {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            box-shadow: var(--shadow-glow);
        }

        .role-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .auth-tabs {
            display: flex;
            background: var(--bg-glass);
            padding: 6px;
            border-radius: 12px;
            margin-bottom: var(--s-md);
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            color: var(--text-dim);
            transition: var(--transition);
            text-decoration: none;
        }

        .auth-tab.active {
            background: var(--primary);
            color: white;
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            padding: 4px;
            user-select: none;
            transition: color var(--transition);
        }

        .password-toggle:hover {
            color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="auth-wrapper reveal">
        <div class="auth-glow"></div>

        <div class="card auth-card">
            <div class="text-center mb-3">
                <h1 class="text-gradient">SkillTern</h1>
                <p class="text-dim">Join the next-gen career platform.</p>
            </div>

            <div class="auth-tabs">
                <a href="login.html" class="auth-tab">Login</a>
                <a href="register.html" class="auth-tab active">Register</a>
            </div>

            <form id="registerForm">
                <label>I want to join as a...</label>
                <div class="role-selection">
                    <div class="role-card" data-role="student">
                        <span class="role-icon">👨‍🎓</span>
                        <strong>Student</strong>
                    </div>
                    <div class="role-card" data-role="company">
                        <span class="role-icon">🏢</span>
                        <strong>Company</strong>
                    </div>
                </div>

                <input type="hidden" id="role" required>

                <div class="form-group">
                    <label for="email">Work Email</label>
                    <input type="email" id="email" required placeholder="name@domain.com">
                </div>

                <div class="grid grid-2">
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" required placeholder="••••••••" minlength="6">
                            <button type="button" class="password-toggle" id="togglePassword"
                                aria-label="Toggle password visibility">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirmPassword" required placeholder="••••••••" minlength="6">
                            <button type="button" class="password-toggle" id="toggleConfirmPassword"
                                aria-label="Toggle password visibility">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Profile fields (will be shown based on role) -->
                <div id="studentFields" class="hidden reveal">
                    <div class="form-group">
                        <label for="studentName">Full Legal Name</label>
                        <input type="text" id="studentName" placeholder="John Doe">
                    </div>
                </div>

                <div id="companyFields" class="hidden reveal">
                    <div class="form-group">
                        <label for="companyName">Organization Name</label>
                        <input type="text" id="companyName" placeholder="Acme Inc.">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    Deploy Account
                </button>
            </form>

            <div class="mt-2 text-center">
                <a href="/" class="text-muted" style="font-size: 0.85rem;">&larr; Return to Home</a>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script>
        // Redirect if already logged in
        if (auth.isAuthenticated()) {
            auth.redirectByRole();
        }

        // Toggle SVG icons
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const eyeIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
        const eyeOffIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.innerHTML = type === 'password' ? eyeIcon : eyeOffIcon;
        });

        toggleConfirmPassword.addEventListener('click', function () {
            const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmPasswordInput.setAttribute('type', type);
            this.innerHTML = type === 'password' ? eyeIcon : eyeOffIcon;
        });

        // Role selection
        const roleCards = document.querySelectorAll('.role-card');
        const roleInput = document.getElementById('role');
        const studentFields = document.getElementById('studentFields');
        const companyFields = document.getElementById('companyFields');

        roleCards.forEach(card => {
            card.addEventListener('click', () => {
                roleCards.forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                const role = card.dataset.role;
                roleInput.value = role;

                // Show/hide profile fields
                if (role === 'student') {
                    studentFields.classList.remove('hidden');
                    companyFields.classList.add('hidden');
                } else if (role === 'company') {
                    companyFields.classList.remove('hidden');
                    studentFields.classList.add('hidden');
                }
            });
        });

        // Handle registration
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = document.getElementById('role').value;

            // Validate
            if (!role) {
                utils.showAlert('Please select a role', 'error');
                return;
            }

            if (password !== confirmPassword) {
                utils.showAlert('Passwords do not match', 'error');
                return;
            }

            // Build profile data
            const profileData = {};
            if (role === 'student') {
                profileData.name = document.getElementById('studentName').value;
            } else if (role === 'company') {
                profileData.companyName = document.getElementById('companyName').value;
            }

            try {
                const response = await api.register({ email, password, role, profileData });
                const data = await utils.handleResponse(response);

                if (data.success) {
                    // Save auth data
                    auth.saveAuth(data.token, data.user);

                    utils.showAlert('Registration successful!', 'success');

                    // Redirect after short delay
                    setTimeout(() => {
                        auth.redirectByRole();
                    }, 1000);
                }
            } catch (error) {
                utils.showAlert(error.message || 'Registration failed', 'error');
            }
        });
    </script>
</body>

</html>
